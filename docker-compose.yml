version: '3.8'

services:
  mysql_db:
    image: mysql:8.0
    container_name: jobportal_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jobportal
      MYSQL_USER: db_user
      MYSQL_PASSWORD: db_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: jobportal_backend
    ports:
      - "8080:8080"
    environment:
      # Spring Profile
      SPRING_PROFILES_ACTIVE: prod
      # Database Properties
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql_db:3306/jobportal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: db_user
      SPRING_DATASOURCE_PASSWORD: db_password
      # Security Config
      JWT_SECRET: ${JWT_SECRET:-dGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS13aGljaC1pcy1hdC1sZWFzdC0yNTYtYml0cy1sb25n}
      JWT_EXPIRATION: 86400000
      CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:80,http://localhost:5173"
      # Cloudinary Config
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      # SMTP Config
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      # Gemini API Config
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      mysql_db:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: jobportal_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
